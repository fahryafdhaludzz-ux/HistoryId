    <h1 class="section-title text-center mx-auto mb-5">Karnivora Purba</h1>
    
    <div class="row row-cols-1 row-cols-md-3 g-4">

      <div class="col">
        <div class="card h-100" onclick="showDetail('Tyrannosaurus Rex', 'Raja dinosaurus. Predator terbesar di zamannya dengan gigitan paling kuat.', 'Cretaceous Akhir (68-66 juta tahun lalu)', 'Amerika Utara', 'https://via.placeholder.com/600x400?text=T-Rex')">

      <div class="col">
        <div class="card h-100" onclick="showDetail('Spinosaurus', 'Dinosaurus karnivora terbesar. Bisa berenang dan berburu di air.', 'Cretaceous (112-93 juta tahun lalu)', 'Afrika Utara', 'https://via.placeholder.com/600x400?text=Spinosaurus')">
