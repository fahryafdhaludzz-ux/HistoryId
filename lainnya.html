  <div class="container py-5 mt-5">
    <h1 class="section-title text-center mx-auto mb-5">Makhluk Purba Lainnya</h1>
    
    <div class="row row-cols-1 row-cols-md-3 g-4">

      <div class="col">
        <div class="card h-100" onclick="showDetail('Arthropleura', 'Seribu kaki raksasa terbesar yang pernah hidup di Bumi. Panjangnya bisa mencapai 2,5 meter.', 'Karboniferus (323-299 juta tahun lalu)', 'Eropa', 'https://via.placeholder.com/600x400?text=Arthropleura')">

            <h5 class="card-title">Arthropleura</h5>
            <p class="card-text">Seribu kaki raksasa.</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100" onclick="showDetail('Titanoboa', 'Ular terbesar yang pernah ada di dunia. Panjangnya mencapai 13 meter.', 'Paleocene (60 juta tahun lalu)', 'Kolombia', 'https://via.placeholder.com/600x400?text=Titanoboa')">
          <img src="TITA.jpg" class="card-img-top fossil-img" alt="Titanoboa">

            <h5 class="card-title">Titanoboa</h5>
            <p class="card-text">Ular raksasa.</p>
          </div>
